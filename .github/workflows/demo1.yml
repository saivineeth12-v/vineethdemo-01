name: Hello World

on: 
  push
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Print build message
        run: echo "This is build job"

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Print test message
        run: echo "This is test job"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Print deploy message
        run: echo "This is deploy job"
